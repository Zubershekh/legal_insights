<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.ckeditor.com/4.21.0/standard/ckeditor.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .sidebar .nav-link { color: #333; border-radius: 6px; padding: 9px 14px; font-size: 14px; }
    .sidebar .nav-link:hover { background: #e9ecef; color: #000; }
    .sidebar .nav-link.active { background: #0059e9; color: #fff !important; }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      padding: 14px 14px 4px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'admin_dashboard' %}">
      <i class="fas fa-user-shield me-2"></i>Admin Panel
    </a>
    <div>
      <a href="{% url 'home' %}" class="btn btn-sm btn-outline-light me-2" target="_blank">View Site</a>
      <a href="{% url 'admin_logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 bg-light p-3 min-vh-100 sidebar">
      <ul class="nav flex-column">

        <div class="sidebar-section-label">Main</div>
        <li class="nav-item mb-1">
          <a class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}"
             href="{% url 'admin_dashboard' %}">
            <i class="fas fa-chart-line me-2"></i>Dashboard
          </a>
        </li>

        <div class="sidebar-section-label">Content</div>
        <li class="nav-item mb-1">
          <a class="nav-link {% if 'judgment' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'admin_judgments' %}">
            <i class="fas fa-gavel me-2"></i>Judgments
          </a>
        </li>
        <li class="nav-item mb-1">
          <a class="nav-link {% if 'article' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'admin_articles' %}">
            <i class="fas fa-newspaper me-2"></i>Articles
          </a>
        </li>
        <li class="nav-item mb-1">
          <a class="nav-link {% if 'categor' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'admin_categories' %}">
            <i class="fas fa-folder me-2"></i>Categories
          </a>
        </li>

        <div class="sidebar-section-label">Legal Guides</div>
        <li class="nav-item mb-1">
          <a class="nav-link {% if 'advocate' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'admin_advocates' %}">
            <i class="fas fa-balance-scale me-2"></i>Advocates
          </a>
        </li>
        <li class="nav-item mb-1">
          <a class="nav-link {% if 'citizen' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'admin_citizens' %}">
            <i class="fas fa-users me-2"></i>Citizens
          </a>
        </li>

      </ul>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
