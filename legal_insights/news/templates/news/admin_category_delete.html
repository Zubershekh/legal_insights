{% extends 'news/admin_base.html' %}
{% block content %}<h2 class="text-danger mb-4">Delete Category</h2>
<div class="alert alert-warning"><p class="mb-0">Are you sure you want to delete: <strong>{{ category.name }}</strong>?</p></div>
<form method="post">{% csrf_token %}
<button type="submit" class="btn btn-danger"><i class="fas fa-trash me-2"></i>Yes, Delete</button> 
<a href="{% url 'admin_categories' %}" class="btn btn-secondary">Cancel</a>
</form>{% endblock %}
