{% extends 'news/admin_base.html' %}
{% block content %}
<h2 class="mb-4">{{ action }} Article Post</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save</button>
    <a href="{% url 'admin_articles' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
