{% extends 'news/admin_base.html' %}
{% block content %}<div class="d-flex justify-content-between mb-3"><h2>Categories</h2>
<a href="{% url 'admin_category_add' %}" class="btn btn-warning"><i class="fas fa-plus me-2"></i>Add New</a></div>
<table class="table table-striped"><thead><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
<tbody>{% for c in categories %}<tr><td>{{ c.name }}</td><td>{{ c.description|truncatewords:10 }}</td>
<td><a href="{% url 'admin_category_edit' c.pk %}" class="btn btn-sm btn-warning">Edit</a> 
<a href="{% url 'admin_category_delete' c.pk %}" class="btn btn-sm btn-danger">Delete</a></td></tr>{% endfor %}
</tbody></table>{% endblock %}
