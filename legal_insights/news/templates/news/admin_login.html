<!DOCTYPE html><html><head><title>Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:#c41e3a;min-height:100vh;display:flex;align-items:center;">
<div class="container"><div class="row justify-content-center"><div class="col-md-4"><div class="card shadow">
<div class="card-body p-4"><h3 class="text-center mb-4"><i class="fas fa-user-shield"></i> Admin Login</h3>
<form method="post">{% csrf_token %}
<div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
<div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
<button type="submit" class="btn btn-danger w-100">Login</button>
</form><div class="text-center mt-3"><a href="{% url 'home' %}">← Back to Website</a></div>
</div></div></div></div></div></body></html>
